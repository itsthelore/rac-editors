name: Extension Release

# Build, test, package, and — only on a `vscode-v*` release tag — publish the
# VS Code / Cursor extension to the Marketplace and OpenVSX. Publishing is the
# last step and is reached only after the full test gate is green. A manual
# `workflow_dispatch` run does everything except publish (a tokenless dry run
# that uploads the .vsix as an artifact). Adapted from rac-core's pre-v0.22.5
# extension-release.yml for the rac-editors home (per-repo battery, published
# rac from PyPI; see rac/roadmaps/rac-editors-buildout.md in rac-core).
#
# Required repository secrets for publishing: VSCE_PAT (Marketplace) and
# OVSX_PAT (OpenVSX). They are checked loudly before either publish step runs,
# so a missing secret can never cause a partial publish. The build/test/package
# steps need neither.
on:
  push:
    tags:
      - "vscode-v*"
  workflow_dispatch:

permissions:
  contents: write # attach the VSIX to the GitHub Release on tag builds

concurrency:
  group: extension-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build · test · package · publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      # The tests and the extension shell out to a real `rac`.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install rac
        run: |
          python -m pip install --upgrade pip
          python -m pip install rac-core

      # ---- gate: the test battery must pass before we package ----
      - name: Install, typecheck, bundle
        working-directory: vscode
        run: |
          npm ci
          npm run check-types
          npm run compile

      - name: Integration tests (@vscode/test-electron)
        working-directory: vscode
        env:
          RAC_BIN: rac
        run: xvfb-run -a npm test

      # ---- package ----
      - name: Package vsix
        working-directory: vscode
        run: npx @vscode/vsce package -o rac-vscode.vsix

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v6
        with:
          name: rac-vscode-vsix
          path: vscode/rac-vscode.vsix
          retention-days: 14

      # ---- publish (release tags only, after everything above is green) ----
      - name: Check publish secrets
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          missing=0
          [ -n "$VSCE_PAT" ] || { echo "::error::VSCE_PAT secret is not set"; missing=1; }
          [ -n "$OVSX_PAT" ] || { echo "::error::OVSX_PAT secret is not set"; missing=1; }
          exit $missing

      - name: Publish to the VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        working-directory: vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath rac-vscode.vsix --pat "$VSCE_PAT"

      - name: Publish to OpenVSX
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        working-directory: vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish rac-vscode.vsix --pat "$OVSX_PAT"

      - name: Attach vsix to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" --generate-notes \
            vscode/rac-vscode.vsix || \
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            vscode/rac-vscode.vsix --clobber
